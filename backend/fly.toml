# fly.toml — Montenegro Coast City Guide backend
# Deploy with:   fly launch --no-deploy  (first time, to create app + volume)
#                fly volumes create data --size 1 --region fra
#                fly deploy
# Then seed:     fly ssh console -C "python cli.py migrate"
#                fly ssh console -C "python cli.py seed"

app = "montenegro-guide-api"
primary_region = "fra"  # Frankfurt — closest EU region

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/montenegro_guide.db"
  DATABASE_URL_SYNC = "sqlite:////data/montenegro_guide.db"
  MEDIA_ROOT = "/data/media"
  API_RELOAD = "false"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
